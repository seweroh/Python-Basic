<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏃 Emoji Parkour Game</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:linear-gradient(#6dcff6,#b9ecff);
    font-family:Arial,sans-serif;
}

canvas{
    display:block;
    margin:auto;
}

#ui{
    position:absolute;
    top:15px;
    left:20px;
    color:white;
    font-size:28px;
    font-weight:bold;
    text-shadow:2px 2px 4px black;
}

#help{
    position:absolute;
    right:20px;
    top:20px;
    color:white;
    font-size:20px;
    text-align:right;
    text-shadow:2px 2px 4px black;
}
</style>
</head>

<body>

<div id="ui">⭐ Score : 0</div>

<div id="help">
⬆️ Space / ↑ Jump<br>
🔄 R Restart
</div>

<canvas id="game" width="1000" height="450"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const ui=document.getElementById("ui");

const ground=330;

let player={
    x:120,
    y:ground,
    w:48,
    h:60,
    vy:0,
    jumping:false
};

let score=0;
let speed=6;
let gameOver=false;

let obstacles=[];
let clouds=[];

for(let i=0;i<5;i++){
    clouds.push({
        x:Math.random()*1000,
        y:30+Math.random()*100,
        s:40+Math.random()*30
    });
}

let spawn=0;

function addObstacle(){

    let emojis=["🪨","🌵","📦"];

    obstacles.push({
        x:canvas.width+50,
        y:ground+8,
        w:42,
        h:42,
        emoji:emojis[Math.floor(Math.random()*emojis.length)]
    });

}

document.addEventListener("keydown",e=>{

    if((e.code==="Space"||e.code==="ArrowUp")&&!player.jumping&&!gameOver){

        player.vy=-15;
        player.jumping=true;

    }

    if(e.key==="r"||e.key==="R") restart();

});

function restart(){

    player.y=ground;
    player.vy=0;
    player.jumping=false;

    obstacles=[];

    score=0;
    speed=6;
    spawn=0;

    gameOver=false;

}

function update(){

    if(gameOver)return;

    player.vy+=0.8;
    player.y+=player.vy;

    if(player.y>=ground){
        player.y=ground;
        player.vy=0;
        player.jumping=false;
    }

    spawn++;

    if(spawn>70-Math.min(speed*3,35)){
        addObstacle();
        spawn=0;
    }

    clouds.forEach(c=>{
        c.x-=speed*0.25;
        if(c.x<-100){
            c.x=canvas.width+50;
            c.y=20+Math.random()*120;
        }
    });

    for(let i=obstacles.length-1;i>=0;i--){

        let o=obstacles[i];

        o.x-=speed;

        if(o.x<-60){

            obstacles.splice(i,1);

            score++;

            if(score%5===0){
                speed+=0.5;
            }

        }

        if(

            player.x<o.x+32 &&
            player.x+36>o.x &&
            player.y<o.y+32 &&
            player.y+50>o.y

        ){

            gameOver=true;

        }

    }

    ui.innerHTML="⭐ Score : "+score;

}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Sky
    ctx.fillStyle="#87CEEB";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // Clouds
    ctx.font="48px serif";
    clouds.forEach(c=>{
        ctx.fillText("☁️",c.x,c.y);
    });

    // Sun
    ctx.font="60px serif";
    ctx.fillText("☀️",850,70);

    // Grass
    ctx.fillStyle="#66bb55";
    ctx.fillRect(0,390,canvas.width,60);

    // Decorative trees
    ctx.font="52px serif";
    for(let i=0;i<12;i++){
        ctx.fillText("🌳",i*100+30,380);
    }

    // Ground
    ctx.font="22px serif";
    for(let i=0;i<80;i++){
        ctx.fillText("🌱",i*25,410);
    }

    // Player
    ctx.font="50px serif";
    ctx.fillText("🏃",player.x,player.y+45);

    // Obstacles
    ctx.font="42px serif";

    obstacles.forEach(o=>{
        ctx.fillText(o.emoji,o.x,o.y+35);
    });

    if(gameOver){

        ctx.fillStyle="rgba(0,0,0,.6)";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        ctx.textAlign="center";

        ctx.font="70px serif";
        ctx.fillText("💥",500,120);

        ctx.font="52px Arial";
        ctx.fillStyle="white";
        ctx.fillText("GAME OVER",500,190);

        ctx.font="30px Arial";
        ctx.fillText("⭐ Score : "+score,500,240);

        ctx.fillText("🔄 Press R to Restart",500,290);

        ctx.fillText("🏆 Try to Beat Your High Score!",500,340);

        ctx.textAlign="left";

    }

}

function loop(){

    update();

    draw();

    requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
